<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0e0c0a" />
    <meta name="color-scheme" content="dark" />

    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link rel="icon" type="image/png" sizes="128x128" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%sveltekit.assets%/app-icon.png" />
    <link rel="mask-icon" href="%sveltekit.assets%/favicon.svg" color="#e8643a" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <meta name="author" content="Geraldo Ferreira Viana Júnior" />
    <meta name="creator" content="Geraldo Ferreira Viana Júnior" />
    <meta property="article:author" content="https://www.linkedin.com/in/geraldovianajr/" />
    <link rel="author" href="https://github.com/gevianajr" />
    <meta property="og:site_name" content="Veesker" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Veesker",
        "description": "Local-first Oracle IDE with optional Veesker Cloud managed intelligence.",
        "applicationCategory": "DeveloperApplication",
        "applicationSubCategory": "Database IDE",
        "operatingSystem": "Windows, macOS, Linux",
        "url": "https://veesker.cloud",
        "license": "https://www.apache.org/licenses/LICENSE-2.0",
        "softwareVersion": "0.2.4",
        "downloadUrl": "https://veesker.cloud/download",
        "screenshot": "https://veesker.cloud/og-image.png",
        "creator": {
          "@type": "Person",
          "name": "Geraldo Ferreira Viana Júnior",
          "url": "https://github.com/gevianajr",
          "sameAs": [
            "https://github.com/gevianajr",
            "https://www.linkedin.com/in/geraldovianajr/",
            "https://veesker.cloud/about"
          ]
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "availability": "https://schema.org/InStock"
        }
      }
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
